on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'checkout'
        uses: 'actions/checkout@v3'
      - name: 'setup-node'
        uses: 'actions/setup-node@v3'
        with:
          node-version: 'latest'
      - run: 'npm i'
      - run: 'npm run deploy'
